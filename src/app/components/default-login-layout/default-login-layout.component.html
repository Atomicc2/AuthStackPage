<main>
    <section class="form-section">
        <img src="/assets/svg/logo.svg">
        <h2>{{ title }}</h2>
        <ng-content></ng-content>
        <div class="btn-wrapper">
            <button 
                class="primary-btn" 
                [disabled]="disablePrimaryBtn"
                (click)="submit()"
            >  
                {{ primaryBtnText }} 
            </button>
            <div class="divider">
                <div></div>
                <span>or</span>
                <div></div>
            </div>
            <button class="secondary-btn" (click)="navigate()"> {{ secondaryBtnText }} </button>    
        </div>
    </section>
    <section class="main-section">
        <h2>Ready? Get Access!</h2>
        <img src="/assets/svg/main-login.svg" class="main-image">
    </section>
</main>
