<app-default-login-layout
    title = "Login into your account"
    primaryBtnText = "login Now"
    secondaryBtnText = "Signup Now"
    (submit)="submit()"
    (navigate)="navigate()"
    [disablePrimaryBtn]="!loginForm.valid"
>   
    <form [formGroup]="loginForm">
        <app-primary-input
            formControlName="email"
            inputName="email"
            type="email"
            label="Email"
            placeholder="andinho@gmail.com"
        > 
            <img src="assets/svg/icon_email.svg">
        </app-primary-input>   
        <app-primary-input
            formControlName="password"
            inputName="password"
            type="password"
            label="Password"
            placeholder="Enter your password"
        > 
            <img src="assets/svg/icon_password.svg">
        </app-primary-input>
        <span>Forgot Password?</span>   
    </form>
</app-default-login-layout>
